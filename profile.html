<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Girlfriend Profile</title>

  <link rel="icon" href="/favicon.svg"/>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: 'Poppins', sans-serif;
    }

    body{
      height:100vh;
      background: radial-gradient(circle at top, #1f1f3a, #0f172a);
      display:flex;
      justify-content:center;
      align-items:center;
      color:white;
      overflow:hidden;
    }

    /* floating background glow */
    body::before{
      content:"";
      position:absolute;
      width:600px;
      height:600px;
      background: radial-gradient(circle, #9333ea55, transparent);
      top:-100px;
      left:-100px;
      filter:blur(120px);
      animation: float 8s infinite alternate;
    }

    @keyframes float{
      0%{ transform:translate(0,0);}
      100%{ transform:translate(80px,80px);}
    }

    .card{
      width:380px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(25px);
      border-radius:25px;
      padding:30px;
      box-shadow:0 20px 60px rgba(0,0,0,0.6);
      text-align:center;
      border:1px solid rgba(255,255,255,0.15);
      transition:0.4s;
    }

    .card:hover{
      transform:scale(1.03);
      box-shadow:0 30px 80px rgba(147,51,234,0.4);
    }

    .profile-img{
      width:120px;
      height:120px;
      border-radius:50%;
      object-fit:cover;
      border:4px solid #a855f7;
      margin-bottom:15px;
      box-shadow:0 0 25px #9333ea;
    }

    .name{
      font-size:28px;
      font-weight:600;
      letter-spacing:1px;
    }

    .status{
      color:#4ade80;
      margin-top:5px;
      font-size:14px;
      display:flex;
      justify-content:center;
      align-items:center;
      gap:6px;
    }

    .status::before{
      content:"";
      width:8px;
      height:8px;
      background:#4ade80;
      border-radius:50%;
      box-shadow:0 0 10px #4ade80;
      animation:pulse 1.5s infinite;
    }

    @keyframes pulse{
      0%{opacity:1;}
      50%{opacity:0.3;}
      100%{opacity:1;}
    }

    .bio{
      margin-top:15px;
      font-size:14px;
      color:#ddd;
      line-height:1.6;
      font-style:italic;
    }

    .buttons{
      margin-top:20px;
      display:flex;
      justify-content:center;
      gap:12px;
    }

    button{
      padding:10px 20px;
      border:none;
      border-radius:12px;
      font-size:14px;
      cursor:pointer;
      transition:0.3s;
      position:relative;
      overflow:hidden;
    }

    /* Message button */
    .msg{
      background:linear-gradient(45deg,#9333ea,#c084fc);
      color:white;
      box-shadow:0 0 15px #9333ea;
    }

    .msg:hover{
      transform:translateY(-2px);
      box-shadow:0 0 25px #c084fc;
    }

    /* Call button */
    .call{
      background:transparent;
      border:1px solid white;
      color:white;
    }

    .call:hover{
      background:white;
      color:black;
      transform:translateY(-2px);
    }

    .chat-preview{
      margin-top:25px;
      text-align:left;
      background:rgba(0,0,0,0.35);
      padding:15px;
      border-radius:15px;
      backdrop-filter:blur(10px);
      border:1px solid rgba(255,255,255,0.1);
    }

    .chat-preview p{
      font-size:13px;
      margin-bottom:6px;
    }

    .chat-preview b{
      color:#c084fc;
    }

  </style>

</head>

<body>

  <div class="card">

    <img src="/pfp copy.jpeg" class="profile-img"/>

    <div class="name">Neha</div>

    <div class="status">Online</div>

    <div class="bio">
      i am 9/10 because i am the one you are missing 💜
    </div>

    <div class="buttons">

      <button class="msg">Message</button>

      <button class="call">Video Call</button>

    </div>

    <div class="chat-preview">

      <p><b>You:</b> Hey what are you doing?</p>
      <p><b>Her:</b> Just waiting for you to message me 😊</p>
      <p><b>You:</b> Missed me?</p>
      <p><b>Her:</b> Always ❤️</p>

    </div>

  </div>

</body>
</html>
